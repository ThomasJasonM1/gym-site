<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer plate rim — navy -->
  <circle cx="32" cy="32" r="32" fill="#3c3b6e"/>
  <!-- Plate face — red -->
  <circle cx="32" cy="32" r="24" fill="#b22234"/>
  <!-- Outer groove ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="2"/>
  <!-- Inner groove ring -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1.5"/>
  <!-- Highlight arc (top-left gloss) -->
  <path d="M 16,20 A 18,18 0 0,1 34,14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
  <!-- Center collar — navy -->
  <circle cx="32" cy="32" r="7" fill="#3c3b6e"/>
  <!-- Center hole -->
  <circle cx="32" cy="32" r="4" fill="#0d0e1a"/>
  <!-- "CF" text -->
  <text x="32" y="33"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#ffffff"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="15"
        letter-spacing="0.5">CF</text>
</svg>
